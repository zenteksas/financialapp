<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenFinance</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0b0f0b" />
    <style>
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: #0b0f0b; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      #splash-screen.fade-out { opacity: 0; visibility: hidden; }
      .splash-logo { width: 120px; height: 120px; margin-bottom: 24px; }
      .splash-footer { 
        position: absolute; bottom: 40px; color: rgba(255,255,255,0.3);
        font-family: sans-serif; font-size: 0.8rem; letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-logo" style="display: flex; align-items: center; justify-content: center; background: #1a221a; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); padding: 20px;">
        <img src="/logo.svg" style="width: 80px; height: 80px;" alt="ZenFinance Logo" />
      </div>
      <div style="color: white; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.8rem; letter-spacing: 0.05em; margin-top: 10px;">ZenFinance</div>
      <div class="splash-footer">by ZENTEK</div>
    </div>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
